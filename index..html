<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHUMPHY — Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Josefin+Sans:wght@100;200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97B;
    --gold-dim: #8A6D2A;
    --cream: #F5EDD8;
    --black: #050505;
    --deep: #0A0A0A;
    --charcoal: #111111;
  }

  html, body {
    height: 100%;
    background: var(--black);
    color: var(--cream);
    font-family: 'Josefin Sans', sans-serif;
    overflow-x: hidden;
  }

  /* ── Ambient background ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 50% 0%, rgba(201,168,76,0.10) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 80% 80%, rgba(201,168,76,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 30% 20% at 15% 60%, rgba(201,168,76,0.05) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }

  /* ── Grain overlay ── */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-size: 200px 200px;
    pointer-events: none; z-index: 0; opacity: 0.5;
  }

  /* ── Page wrapper ── */
  .page {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 3rem 2rem;
  }

  /* ── Top decorative rule ── */
  .top-rule {
    position: absolute; top: 2.5rem; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 1rem; white-space: nowrap;
  }
  .top-rule .line { width: 80px; height: 0.5px; background: var(--gold-dim); }
  .top-rule span {
    font-size: 9px; letter-spacing: 0.35em; color: var(--gold-dim);
    font-weight: 300; text-transform: uppercase;
  }

  /* ── Logo area ── */
  .logo-wrap {
    display: flex; flex-direction: column; align-items: center;
    animation: fadeUp 1.2s ease both;
  }

  .logo-img {
    width: 180px; height: 180px; object-fit: contain;
    filter: drop-shadow(0 0 40px rgba(201,168,76,0.25));
    animation: subtlePulse 6s ease-in-out infinite;
  }

  /* ── Brand name ── */
  .brand {
    margin-top: 1.5rem;
    font-size: clamp(2.4rem, 6vw, 4.2rem);
    font-weight: 200;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 40%, var(--gold-dim) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: fadeUp 1.2s 0.2s ease both;
  }

  /* ── Tagline ── */
  .tagline {
    margin-top: 0.5rem;
    font-size: clamp(0.6rem, 1.4vw, 0.72rem);
    letter-spacing: 0.55em;
    text-transform: uppercase;
    color: var(--gold-dim);
    font-weight: 300;
    animation: fadeUp 1.2s 0.35s ease both;
  }

  /* ── Divider ── */
  .divider {
    display: flex; align-items: center; gap: 1.2rem;
    margin: 2.8rem 0 2.4rem;
    animation: fadeUp 1.2s 0.5s ease both;
  }
  .divider .line { width: 100px; height: 0.5px; background: linear-gradient(90deg, transparent, var(--gold-dim)); }
  .divider .line.r { background: linear-gradient(90deg, var(--gold-dim), transparent); }
  .divider .diamond {
    width: 8px; height: 8px;
    background: var(--gold);
    transform: rotate(45deg);
    box-shadow: 0 0 12px rgba(201,168,76,0.5);
  }

  /* ── Coming soon headline ── */
  .headline {
    text-align: center;
    animation: fadeUp 1.2s 0.6s ease both;
  }
  .headline .sub {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(0.7rem, 1.5vw, 0.82rem);
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--gold-dim);
    font-style: italic;
    margin-bottom: 0.5rem;
  }
  .headline h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3rem, 8vw, 6rem);
    font-weight: 300;
    line-height: 1;
    letter-spacing: 0.05em;
    background: linear-gradient(160deg, #fff 0%, var(--cream) 40%, var(--gold-light) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .headline h1 em {
    font-style: italic;
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ── Month badge ── */
  .month-badge {
    margin: 2.5rem auto 0;
    display: inline-flex; align-items: center; gap: 1rem;
    border: 0.5px solid rgba(201,168,76,0.35);
    padding: 0.7rem 2.2rem;
    position: relative;
    animation: fadeUp 1.2s 0.75s ease both;
  }
  .month-badge::before, .month-badge::after {
    content: '';
    position: absolute; top: -1px;
    width: 8px; height: 2px; background: var(--gold);
  }
  .month-badge::before { left: -1px; }
  .month-badge::after { right: -1px; }
  .month-badge .corner-b { position: absolute; bottom: -1px; width: 8px; height: 2px; background: var(--gold); }
  .month-badge .corner-b.l { left: -1px; }
  .month-badge .corner-b.r { right: -1px; }

  .month-badge .month-text {
    font-size: clamp(1.1rem, 3vw, 1.5rem);
    font-weight: 100;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: var(--gold-light);
  }
  .month-badge .year {
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    color: var(--gold-dim);
    font-weight: 300;
    padding-left: 0.5rem;
    border-left: 0.5px solid var(--gold-dim);
  }

  /* ── Countdown ── */
  .countdown-section {
    margin-top: 3rem;
    text-align: center;
    animation: fadeUp 1.2s 0.9s ease both;
  }
  .countdown-label {
    font-size: 0.6rem; letter-spacing: 0.45em;
    text-transform: uppercase; color: var(--gold-dim);
    margin-bottom: 1.4rem; font-weight: 300;
  }
  .countdown {
    display: flex; gap: clamp(1rem, 3vw, 2.5rem); justify-content: center;
  }
  .cd-unit { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; }
  .cd-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.5rem, 6vw, 4rem);
    font-weight: 300;
    line-height: 1;
    background: linear-gradient(160deg, #fff 0%, var(--gold-light) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    min-width: 2.5ch; text-align: center;
  }
  .cd-lbl {
    font-size: 0.55rem; letter-spacing: 0.4em;
    text-transform: uppercase; color: var(--gold-dim); font-weight: 300;
  }
  .cd-sep {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 300;
    color: var(--gold-dim);
    align-self: flex-start; margin-top: 0.15em;
    animation: blink 1.2s step-end infinite;
  }

  /* ── Email signup ── */
  .signup {
    margin-top: 3rem;
    animation: fadeUp 1.2s 1.05s ease both;
    text-align: center;
  }
  .signup p {
    font-size: 0.68rem; letter-spacing: 0.35em;
    text-transform: uppercase; color: var(--gold-dim);
    margin-bottom: 1.2rem; font-weight: 300;
  }
  .signup-form {
    display: flex; gap: 0; max-width: 420px;
    border: 0.5px solid rgba(201,168,76,0.40);
    position: relative;
  }
  .signup-form::before {
    content: '';
    position: absolute; bottom: -1px; left: 0;
    height: 1px; width: 0;
    background: var(--gold);
    transition: width 0.6s ease;
  }
  .signup-form:focus-within::before { width: 100%; }

  .signup-form input {
    flex: 1;
    background: rgba(201,168,76,0.04);
    border: none; outline: none;
    padding: 0.85rem 1.2rem;
    color: var(--cream);
    font-family: 'Josefin Sans', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    font-weight: 300;
  }
  .signup-form input::placeholder { color: rgba(201,168,76,0.3); letter-spacing: 0.2em; }
  .signup-form button {
    background: var(--gold);
    border: none; cursor: pointer;
    padding: 0.85rem 1.5rem;
    color: var(--black);
    font-family: 'Josefin Sans', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    font-weight: 400;
    text-transform: uppercase;
    transition: background 0.3s, transform 0.15s;
  }
  .signup-form button:hover { background: var(--gold-light); transform: scaleX(1.03); }
  .signup-form button:active { transform: scaleX(0.98); }
  .success-msg {
    display: none; margin-top: 0.8rem;
    font-size: 0.65rem; letter-spacing: 0.3em;
    text-transform: uppercase; color: var(--gold);
  }

  /* ── Social icons ── */
  .socials {
    margin-top: 3rem;
    display: flex; gap: 1.8rem; justify-content: center;
    animation: fadeUp 1.2s 1.2s ease both;
  }
  .social-link {
    width: 38px; height: 38px;
    border: 0.5px solid rgba(201,168,76,0.3);
    display: flex; align-items: center; justify-content: center;
    text-decoration: none;
    transition: border-color 0.3s, transform 0.3s;
    position: relative;
  }
  .social-link::after {
    content: '';
    position: absolute; inset: 0;
    background: rgba(201,168,76,0.06);
    opacity: 0; transition: opacity 0.3s;
  }
  .social-link:hover { border-color: var(--gold); transform: translateY(-3px); }
  .social-link:hover::after { opacity: 1; }
  .social-link svg { width: 14px; height: 14px; fill: var(--gold-dim); transition: fill 0.3s; }
  .social-link:hover svg { fill: var(--gold-light); }

  /* ── Bottom rule ── */
  .bottom-rule {
    position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%);
    font-size: 0.55rem; letter-spacing: 0.4em;
    text-transform: uppercase; color: rgba(201,168,76,0.2);
    white-space: nowrap;
  }

  /* ── Corner ornaments ── */
  .corner { position: fixed; width: 50px; height: 50px; }
  .corner.tl { top: 1.5rem; left: 1.5rem; border-top: 0.5px solid var(--gold-dim); border-left: 0.5px solid var(--gold-dim); }
  .corner.tr { top: 1.5rem; right: 1.5rem; border-top: 0.5px solid var(--gold-dim); border-right: 0.5px solid var(--gold-dim); }
  .corner.bl { bottom: 1.5rem; left: 1.5rem; border-bottom: 0.5px solid var(--gold-dim); border-left: 0.5px solid var(--gold-dim); }
  .corner.br { bottom: 1.5rem; right: 1.5rem; border-bottom: 0.5px solid var(--gold-dim); border-right: 0.5px solid var(--gold-dim); }

  /* ── Keyframes ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes subtlePulse {
    0%, 100% { filter: drop-shadow(0 0 30px rgba(201,168,76,0.20)); }
    50%       { filter: drop-shadow(0 0 60px rgba(201,168,76,0.40)); }
  }
  @keyframes blink {
    0%, 100% { opacity: 1; } 50% { opacity: 0.1; }
  }

  @media (max-width: 480px) {
    .corner { width: 30px; height: 30px; }
    .top-rule .line { width: 40px; }
    .signup-form { flex-direction: column; }
    .signup-form button { padding: 0.75rem; }
  }
</style>
</head>

      <button onclick="handleSubmit()">Notify Me</button>

  </div>

  <!-- Socials -->
  <div class="socials">

    <a class="social-link" href="#" title="Instagram" aria-label="Instagram">

</div>

<script>
  // Countdown to June 1, 2026
  const launch = new Date('2026-06-01T00:00:00').getTime();

  function updateCountdown() {
    const now = Date.now();
    const diff = launch - now;
    if (diff <= 0) {
      document.getElementById('days').textContent = '00';
      document.getElementById('hours').textContent = '00';
      document.getElementById('mins').textContent = '00';
      document.getElementById('secs').textContent = '00';
      return;
    }
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    document.getElementById('days').textContent  = String(d).padStart(2,'0');
    document.getElementById('hours').textContent = String(h).padStart(2,'0');
    document.getElementById('mins').textContent  = String(m).padStart(2,'0');
    document.getElementById('secs').textContent  = String(s).padStart(2,'0');
  }

  updateCountdown();
  setInterval(updateCountdown, 1000);

  // Email submit
  function handleSubmit() {
    const input = document.getElementById('emailInput');
    const msg = document.getElementById('successMsg');
    const val = input.value.trim();
    if (!val || !/\S+@\S+\.\S+/.test(val)) {
      input.style.borderBottom = '1px solid rgba(201,168,76,0.8)';
      input.focus(); return;
    }
    input.parentElement.style.display = 'none';
    msg.style.display = 'block';
  }

  document.getElementById('emailInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleSubmit();
  });
</script>
</body>
</html>
